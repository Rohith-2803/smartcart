{% extends "admin/base.html" %}

{% block title %}Add Product{% endblock %}
{% block header %}Add New Product{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('add_item') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Wireless Headphones"
                required>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-control" required>
                <option value="">Select Category</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home">Home</option>
                <option value="Beauty">Beauty</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="price">Price (₹)</label>
                <input type="number" id="price" name="price" class="form-control" step="0.01" placeholder="0.00"
                    required>
            </div>
            <div class="form-group">
                <label for="stock">Stock Quantity</label>
                <input type="number" id="stock" name="stock" class="form-control" placeholder="0" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="4"
                placeholder="Enter product details..."></textarea>
        </div>

        <div class="form-group">
            <label for="image">Product Image</label>
            <input type="file" id="image" name="image" class="form-control" accept="image/*" required>
            <p style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.5rem;">Recommended size: 800x800px
            </p>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Product</button>
            <a href="{{ url_for('item_list') }}" class="btn"
                style="background: #f1f5f9; color: var(--text-primary); width: 100%;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
