{% extends "user/base.html" %}

{% block title %}Admin Forgot Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;"><i class="fas fa-key"></i> Admin Reset</h1>
        <p style="color: #64748b;">Enter your admin email for a reset link.</p>
    </div>

    <form action="{{ url_for('admin_forgot_password') }}" method="POST">
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="email" style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Admin Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="admin@smartcart.com" required style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 10px;">
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem;">Send Reset Link</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p style="color: #64748b;">Remembered? <a href="{{ url_for('admin_login') }}" style="color: #6366f1; font-weight: 600; text-decoration: none;">Back to Login</a></p>
    </div>
</div>
{% endblock %}
