{% extends "admin/base.html" %}

{% block title %}Update Product{% endblock %}
{% block header %}Update Product{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('update_item', product_id=product.product_id) }}" method="POST"
        enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ product.name }}" required>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-control" required>
                <option value="Electronics" {% if product.category=='Electronics' %}selected{% endif %}>Electronics
                </option>
                <option value="Fashion" {% if product.category=='Fashion' %}selected{% endif %}>Fashion</option>
                <option value="Home" {% if product.category=='Home' %}selected{% endif %}>Home</option>
                <option value="Beauty" {% if product.category=='Beauty' %}selected{% endif %}>Beauty</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="price">Price (₹)</label>
                <input type="number" id="price" name="price" class="form-control" step="0.01"
                    value="{{ product.price }}" required>
            </div>
            <div class="form-group">
                <label for="stock">Stock Quantity</label>
                <input type="number" id="stock" name="stock" class="form-control" value="{{ product.stock }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control"
                rows="4">{{ product.description }}</textarea>
        </div>

        <div class="form-group">
            <label>Current Image</label>
            <div style="margin-bottom: 1rem;">
                <img src="{{ url_for('static', filename='uploads/product_images/' + product.image if product.image else 'default_product.png') }}"
                    style="width: 100px; height: 100px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0;">
            </div>
            <label for="image">Replace Image (Optional)</label>
            <input type="file" id="image" name="image" class="form-control" accept="image/*">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Update Product</button>
            <a href="{{ url_for('item_list') }}" class="btn"
                style="background: #f1f5f9; color: var(--text-primary); width: 100%;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
