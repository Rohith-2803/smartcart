{% extends "user/base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;">New Password</h1>
        <p style="color: #64748b;">Enter your new password below to reset your account.</p>
    </div>

    <form action="{{ url_for('reset_password', token=token) }}" method="POST">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem;">Update Password</button>
    </form>
</div>
{% endblock %}
