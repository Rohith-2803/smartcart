{% extends "user/base.html" %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;">Join SmartCart</h1>
        <p style="color: #64748b;">Create your account to start shopping.</p>
    </div>

    <form action="{{ url_for('user_signup') }}" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem;">Create Account</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p style="color: #64748b;">Already have an account? <a href="{{ url_for('user_login') }}" style="color: #6366f1; font-weight: 600; text-decoration: none;">Login here</a></p>
    </div>
</div>
{% endblock %}
