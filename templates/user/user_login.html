{% extends "user/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;">Welcome Back</h1>
        <p style="color: #64748b;">Please enter your details to login.</p>
    </div>

    <form action="{{ url_for('user_login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            <div style="text-align: right; margin-top: 0.5rem;">
                <a href="{{ url_for('forgot_password') }}" style="font-size: 0.85rem; color: #6366f1; text-decoration: none;">Forgot password?</a>
            </div>
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem;">Sign In</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p style="color: #64748b;">Don't have an account? <a href="{{ url_for('user_signup') }}" style="color: #6366f1; font-weight: 600; text-decoration: none;">Sign up here</a></p>
    </div>

    <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #f1f5f9; text-align: center;">
        <a href="{{ url_for('admin_login') }}" style="display: inline-flex; align-items: center; gap: 0.5rem; color: #64748b; font-size: 0.85rem; text-decoration: none; padding: 0.6rem 1.25rem; border: 1px solid #e2e8f0; border-radius: 10px; transition: all 0.3s;"
           onmouseover="this.style.borderColor='#6366f1'; this.style.color='#6366f1'; this.style.background='#f5f3ff'"
           onmouseout="this.style.borderColor='#e2e8f0'; this.style.color='#64748b'; this.style.background='white'">
            <i class="fas fa-shield-alt"></i> Admin Login
        </a>
    </div>
</div>
{% endblock %}
