{% extends "user/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                        <i class="fas fa-user-lock fs-3"></i>
                    </div>
                    <h1 class="h3 fw-bold text-dark mb-1">Welcome Back</h1>
                    <p class="text-muted small">Sign in to your SmartCart account</p>
                </div>

                <form action="{{ url_for('user_login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control py-2 rounded-3 border-light bg-light" placeholder="john@example.com" required>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="password" class="form-label small fw-bold mb-0">Password</label>
                            <a href="{{ url_for('forgot_password') }}" class="text-primary small text-decoration-none">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password" class="form-control py-2 rounded-3 border-light bg-light" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary bg-gradient w-100 py-2 fw-bold rounded-3 border-0 shadow-sm mt-3">
                        Sign In
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-muted small mb-0">Don't have an account? <a href="{{ url_for('user_signup') }}" class="text-primary fw-bold text-decoration-none">Sign up here</a></p>
                </div>

                <div class="mt-4 pt-4 border-top text-center">
                    <a href="{{ url_for('admin_login') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-4">
                        <i class="fas fa-shield-alt me-2"></i>Admin Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
