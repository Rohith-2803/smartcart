{% extends "user/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;">Reset Password</h1>
        <p style="color: #64748b;">Enter your email to receive a password reset link.</p>
    </div>

    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem;">Send Reset Link</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p style="color: #64748b;">Remember your password? <a href="{{ url_for('user_login') }}" style="color: #6366f1; font-weight: 600; text-decoration: none;">Login here</a></p>
    </div>
</div>
{% endblock %}
