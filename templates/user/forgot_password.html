{% extends "user/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                        <i class="fas fa-key fs-3"></i>
                    </div>
                    <h1 class="h3 fw-bold text-dark mb-1">Reset Password</h1>
                    <p class="text-muted small">Enter your email to receive a reset link</p>
                </div>

                <form action="{{ url_for('forgot_password') }}" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label small fw-bold">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control py-2 rounded-3 border-light bg-light shadow-none" placeholder="john@example.com" required>
                    </div>

                    <button type="submit" class="btn btn-primary bg-gradient w-100 py-2 fw-bold rounded-3 border-0 shadow-sm">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-muted small mb-0">Remembered? <a href="{{ url_for('user_login') }}" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
