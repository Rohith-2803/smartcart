{% extends "superadmin/base.html" %}

{% block title %}Super Admin Profile{% endblock %}

{% block content %}
<div style="padding: 2rem 0;">
    <header style="margin-bottom: 2.5rem;">
        <div>
            <h1 style="font-size: 2rem; font-weight: 800; color: #1e293b;">My <span style="color: #6366f1;">Profile</span></h1>
            <p style="color: #64748b;">Manage your super administrator account details.</p>
        </div>
    </header>

    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2.5rem; align-items: start;">
        <!-- Profile Card -->
        <div class="card" style="text-align: center; padding: 3rem 2rem; border-radius: 24px;">
            <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                <img src="{{ url_for('static', filename='uploads/admin_profiles/' + admin.profile_image if admin.profile_image else 'default.png') }}" 
                     style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #6366f1; padding: 4px;">
                <div style="position: absolute; bottom: 5px; right: 5px; width: 35px; height: 35px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 3px solid white;">
                    <i class="fas fa-crown" style="font-size: 0.8rem;"></i>
                </div>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.25rem;">{{ admin.name }}</h2>
            <p style="color: #6366f1; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;">System Administrator</p>
            <div style="display: flex; justify-content: center; gap: 0.75rem; margin-top: 1.5rem;">
                <div style="padding: 0.5rem 1rem; background: #f1f5f9; border-radius: 10px; font-size: 0.85rem; font-weight: 600;">
                    <i class="fas fa-envelope" style="margin-right: 0.5rem; color: #64748b;"></i> {{ admin.email }}
                </div>
            </div>
        </div>

        <!-- Edit Form -->
        <div class="card" style="padding: 2.5rem; border-radius: 24px;">
            <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                <i class="fas fa-user-pen" style="color: #6366f1;"></i> Edit Profile Details
            </h3>
            
            <form action="{{ url_for('superadmin_profile') }}" method="POST" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Full Name</label>
                        <input type="text" name="name" value="{{ admin.name }}" class="form-control" required style="border-radius: 10px; padding: 0.75rem;">
                    </div>
                    <div class="form-group">
                        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Email Address</label>
                        <input type="email" name="email" value="{{ admin.email }}" class="form-control" required style="border-radius: 10px; padding: 0.75rem;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    <div class="form-group">
                        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">New Password (Optional)</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current" style="border-radius: 10px; padding: 0.75rem;">
                    </div>
                    <div class="form-group">
                        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Profile Image</label>
                        <input type="file" name="profile_image" class="form-control" style="border-radius: 10px; padding: 0.6rem;">
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                    <button type="submit" class="btn-gradient" style="width: auto; padding: 0.8rem 2.5rem; border-radius: 12px; font-weight: 700;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
