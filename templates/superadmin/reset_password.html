{% extends "user/base.html" %}

{% block title %}Super Admin Reset Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;"><i class="fas fa-lock-open"></i> Reset Password</h1>
        <p style="color: #64748b;">Enter a new password for your super admin account.</p>
    </div>

    <form action="{{ url_for('superadmin_reset_password', token=token) }}" method="POST">
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="password" style="font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">New Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 10px;">
        </div>

        <button type="submit" class="btn-gradient" style="margin-top: 1rem; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">Update Password</button>
    </form>
</div>
{% endblock %}
